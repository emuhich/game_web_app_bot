{% extends 'base.html' %}
{% block title %}Игра{% endblock %}
{% block styles %}<link rel="stylesheet" href="/static/css/webapp.css?v=13">{% endblock %}
{% block content %}
<div class="page play-page"
     data-is-premium-category="{{ '1' if category.is_premium else '0' }}"
     data-has-premium="{{ '1' if premium else '0' }}">
  <header class="page-header">
    <!-- системная Telegram BackButton -->
  </header>
  <main class="page-main">
    <div class="cards-stack" id="cards-stack">
      {% for q in questions %}
      <article class="question-card" data-index="{{ loop.index0 }}">
        <div class="q-header">{{ category.name }}</div>
        <div class="q-content">
          <p class="q-text">{{ q.text }}</p>
        </div>
      </article>
      {% endfor %}
    </div>
  </main>
</div>
{% endblock %}
{% block scripts %}
<script type="module" src="/static/js/haptics.js"></script>
<script type="module" src="/static/js/auth.js"></script>
<script type="module" src="/static/js/honesty_play.js?v=8"></script>
{% endblock %}
