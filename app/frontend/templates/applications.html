{% extends "base.html" %}
{% block title %}Мои записи{% endblock %}
{% block body_class %}form-page{% endblock %}
{% block styles %}
<link rel="stylesheet" href="/static/css/form.css">
<link rel="stylesheet" href="/static/css/applications.css">
{% endblock %}
{% block content %}
<div class="form-wrapper">
  <!-- Исправлено: ссылка ведет на главную страницу вместо /app-v-1/static -->
  <a href="/" class="back-btn">← Назад</a>
  <h1>Мои записи</h1>
  <div class="refresh-bar">
    <button id="refresh-apps" class="refresh-btn" type="button">Обновить список</button>
    <div id="loading" class="loading-spinner"></div>
  </div>
  <div id="apps" class="app-list"></div>
  <div id="empty" class="empty" style="display:none;">Нет активных записей</div>
  <div id="status" class="status-banner"></div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/applications.js"></script>
{% endblock %}
