{% extends 'base.html' %}
{% block title %}Игры{% endblock %}
{% block styles %}
<link rel="stylesheet" href="/static/css/webapp.css?v=9">
{% endblock %}
{% block content %}
<div class="page games-page" style="background: url('/static/media/2nugy_.png') center/cover no-repeat fixed;">
  <header class="page-header">
    <h2 class="page-title">Выбери игру</h2>
  </header>
  <main class="page-main">
    <section class="categories-row no-scrollbar games-row" id="games-row">
      {% for g in games %}
      <article class="category-card game-card" data-code="{{ g.code }}" aria-label="{{ g.title }}">
        <img src="/{{ g.image }}" alt="{{ g.title }}" class="card-img" />
      </article>
      {% endfor %}
    </section>
  </main>
  <footer class="page-footer">
    <div class="footer-actions single">
      <button type="button" id="play-current" class="primary-btn full">Играть</button>
      <a href="/premium" class="premium-link buy-premium">Premium</a>
    </div>
  </footer>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/index.js?v=2"></script>
{% endblock %}
