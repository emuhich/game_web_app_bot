{% extends 'base.html' %}
{% block title %}Игры{% endblock %}
{% block styles %}
<link rel="stylesheet" href="/static/css/webapp.css?v=9">
{% endblock %}
{% block content %}
<div class="page games-page">
  <header class="page-header">
    <h2 class="page-title title-font">Выбери игру</h2>
  </header>
  <main class="page-main">
    <section class="categories-row no-scrollbar games-row" id="games-row">
      {% for g in games %}
      <article class="category-card game-card" data-code="{{ g.code }}" data-in-development="{{ '1' if g.in_development else '0' }}" aria-label="{{ g.title }}">
        {% if loop.first %}
        <img src="/{{ g.image }}" alt="{{ g.title }}" class="card-img" loading="eager" fetchpriority="high" decoding="async" width="1600" height="900" />
        {% else %}
        <img src="/{{ g.image }}" alt="{{ g.title }}" class="card-img" loading="lazy" fetchpriority="low" decoding="async" width="1600" height="900" />
        {% endif %}
      </article>
      {% endfor %}
    </section>
  </main>
  <footer class="page-footer">
    <div class="footer-actions single">
      <button type="button" id="play-current" class="primary-btn full">Играть</button>
      <a href="/premium" class="premium-link buy-premium">Premium</a>
    </div>
  </footer>
</div>
{% endblock %}
{% block scripts %}
<script type="module" src="/static/js/haptics.js"></script>
<script type="module" src="/static/js/auth.js"></script>
<script type="module" src="/static/js/index.js?v=4"></script>
{% endblock %}
