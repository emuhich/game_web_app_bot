<!DOCTYPE html>
<html lang="ру">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}Моё FastAPI Приложение{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/base.css?v={{ build_hash }}">
    {% block styles %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
{% block content %} {% endblock %}

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/telegram_init.js?v={{ build_hash }}"></script>
<script type="module" src="/static/js/haptics.js?v={{ build_hash }}"></script>
<script type="module" src="/static/js/auth.js?v={{ build_hash }}"></script>
{% block scripts %} {% endblock %}
</body>
</html>
