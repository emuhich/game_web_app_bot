<!DOCTYPE html>
<html lang="ру">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}Мое FastAPI Приложение{% endblock %}</title>
    {% block styles %}{% endblock %}
    <style>
      html, body { height: 100%; overscroll-behavior: none; margin: 0; }
      body { touch-action: manipulation; overflow: hidden; }
      * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
{% block content %} {% endblock %}

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/telegram_init.js"></script>
<script type="module" src="/static/js/haptics.js"></script>
<script type="module" src="/static/js/auth.js"></script>
{% block scripts %} {% endblock %}
</body>
</html>
